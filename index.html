<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Sistema de Gestión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <!-- Contenedor principal del formulario de login -->
    <div class="login-container">
        <!-- Tarjeta con el formulario -->
        <div class="card">
            <h1 style="text-align: center; margin-bottom: 20px; color: #333;">
                Iniciar Sesión
            </h1>

            <!-- Mensaje de error-->
            <div id="mensaje-error" class="error-message" style="display: none;">
            </div>

            <!-- Formulario de login -->
            <form class="login-form" onsubmit="return false;">
                <!-- Grupo: Usuario -->
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        placeholder="Ingresa tu usuario"
                        autocomplete="username"
                    >
                </div>

                <!-- Grupo: Contraseña -->
                <div class="form-group">
                    <label for="contrasena">Contraseña</label>
                    <input
                        type="password"
                        id="contrasena"
                        name="contrasena"
                        placeholder="Ingresa tu contraseña"
                        autocomplete="current-password"
                    >
                </div>

                <!-- Botón para iniciar sesión -->
                <button
                    type="button"
                    class="btn btn-primary"
                    style="width: 100%; margin-top: 10px;"
                    onclick="procesarLogin()"
                >
                    Ingresar
                </button>
            </form>
        </div>
    </div>

    <!-- Incluir los archivos JavaScript -->
    <!-- Primero datos.js (contiene los arreglos y funciones de datos) -->
    <script src="datos.js"></script>
    <!-- Luego logica.js (contiene la lógica de la interfaz) -->
    <script src="logica.js"></script>

       <!-- Inicializar el login cuando la página cargue -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            inicializarLogin();
        });
    </script>
</script>
</body>
</html>
